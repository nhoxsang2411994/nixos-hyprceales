###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER

# See https://wiki.hyprland.org/Configuring/Binds/ for more

# Caelestia
exec = hyprctl dispatch submap global
submap = global # not sure what this does

bind = $mainMod SHIFT, Q, exec, waylock
bind = $mainMod,       COMMA, exec,   ~/.config/waybar/scripts/launch.sh
#bind = $mainMod,       M,     exec,   caelestia toggle music
bind = $mainMod,       P,     exec, $menu

bind = $mainMod, T, exec, ~/.config/hypr/scripts/raise-or-run.sh ghostty com.mitchellh.ghostty
bind = $mainMod, Z, exec, ghostty -e nano ~/.config/hypr/keybindings.conf

# More custom bindings
bind = $mainMod CTRL, E, exec, dolphin
bind = $mainMod CTRL, T, exec, kitty
bind = $mainMod CTRL, W, exec, firefox
bind = $mainMod CTRL, N, exec, kate

#bindir = $mainMod, Super_L, exec, vicinae toggle
#
bind = $mainMod, V,      exec, vlc
bind = $mainMod, period, exec, steam
bind = $mainMod, I, exec, ghostty --command="hyprctl layers && read"

# Screenshots
bind = CTRL,  PRINT, exec, hyprshot --clipboard-only --mode active --mode output
bind = SHIFT, PRINT, exec, hyprshot --clipboard-only --mode window
bind = ,      PRINT, exec, hyprshot --clipboard-only --mode region

# Manage windows
bind = $mainMod, Q, killactive,
bind = $mainMod, X, togglefloating,
bind = $mainMod, S, togglesplit, # dwindle
bind = $mainMod, F, fullscreen, 1
bind = $mainMod SHIFT, F, fullscreen, 0
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d
bind = $mainMod SHIFT, H, movewindow, l
bindel = $mainMod ALT, L, resizeactive, 20 0
bindel = $mainMod ALT, H, resizeactive, -20 0
bindel = $mainMod ALT, K, resizeactive, 0 -20
bindel = $mainMod ALT, J, resizeactive, 0 20

# Move window focus
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r
bind = $mainMod, code:49, focuscurrentorlast # Backtick

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Focus on other monitor
bind = $mainMod CTRL, l, focusmonitor, +1
bind = $mainMod CTRL, h, focusmonitor, -1

# Move active window to other monitor
bind = $mainMod CTRL SHIFT, l, movewindow, mon:+1
bind = $mainMod CTRL SHIFT, h, movewindow, mon:-1

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

#bindl = , XF86MonBrightnessUp, global, caelestia:brightnessUp
#bindl = , XF86MonBrightnessDown, global, caelestia:brightnessDown

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Disable laptop screen when lid is closed
bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor "eDP-1, enable"
bindl = , switch:on:Lid Switch, exec,hyprctl keyword monitor "eDP-1, disable"
